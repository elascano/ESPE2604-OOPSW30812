<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MazeGen Pro - JavaScript MVC (ESM/Vite)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">MazeGen Pro</div>
    
    <div class="controls">
      <div class="form-group">
        <label for="widthInput">Width (N)</label>
        <input type="number" id="widthInput" value="15" min="2" max="100">
      </div>
      
      <div class="form-group">
        <label for="heightInput">Height (M)</label>
        <input type="number" id="heightInput" value="15" min="2" max="100">
      </div>
      
      <button class="btn-generate" id="generateBtn">Generate Maze</button>
    </div>
  </aside>

  <main class="main-area">
    <div class="panel">
      <div class="panel-header">Graphical View</div>
      <div class="panel-content canvas-container">
        <canvas id="mazeCanvas"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">ASCII Output</div>
      <div class="panel-content ascii-container">
        <pre id="mazeAscii"></pre>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
