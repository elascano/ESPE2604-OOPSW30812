<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animal Operations</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">
            <h2>Farm System</h2>
        </div>

        <ul class="menu">

            <li><a href="index.html">Home</a></li>

            <li><a href="animals.html">Animals</a></li>

            <li><a href="food.html">Food</a></li>

        </ul>

    </nav>

    <div class="container">

        <!-- ================= LEFT ================= -->

        <div class="form-container">

            <h2>Animal Operations</h2>

            <div class="form-group">

                <label>ID</label>

                <label id="lblId">-</label>

            </div>

            <div class="form-group">

                <label>Animal Type</label>

                <label id="lblType">-</label>

            </div>

            <div class="form-group">

                <label>Age In Months</label>

                <label id="lblAge">-</label>

                <button id="btnCalculateAge">

                    Calculate

                </button>

            </div>

            <hr>

            <div class="form-group">

                <label>Food</label>

                <select id="cmbFood">

                </select>

            </div>

            <button id="btnFeed">

                Feed

            </button>

            <hr>

            <h3>Animal Information</h3>

            <div class="form-group">

                <label id="lblAttribute1">

                    Attribute 1

                </label>

                <label id="lblValue1">

                    -

                </label>

            </div>

            <div class="form-group">

                <label id="lblAttribute2">

                    Attribute 2

                </label>

                <label id="lblValue2">

                    -

                </label>

            </div>

            <div class="button-group">

                <button id="btnOperation1">

                    Operation 1

                </button>

                <button id="btnOperation2">

                    Operation 2

                </button>

            </div>

            <br>

            <button id="btnClear">

                Clear

            </button>

        </div>

        <!-- ================= RIGHT ================= -->

        <div class="table-container">

            <h2>Animals</h2>

            <table id="tblAnimals">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Type</th>

                        <th>Breed</th>

                        <th>Birth</th>

                        <th>Weight</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/animalOperations.js"></script>

</body>

</html>
