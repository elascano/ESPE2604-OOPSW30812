<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animals</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">
            <h2>Farm System</h2>
        </div>

        <ul class="menu">

            <li><a href="index.html">Home</a></li>

            <li><a href="food.html">Food</a></li>

            <li><a href="animalOperations.html">Operations</a></li>

        </ul>

    </nav>

    <div class="container">

        <!-- ================= LEFT ================= -->

        <div class="form-container">

            <h2>Animal Management</h2>

            <div class="form-group">

                <label>Animal Type</label>

                <select id="cmbType">

                    <option>Chicken</option>
                    <option>Cow</option>
                    <option>Pig</option>
                    <option>Sheep</option>

                </select>

            </div>

            <div class="form-group">

                <label>ID</label>

                <input type="number" id="txtId">

            </div>

            <div class="form-group">

                <label>Breed</label>

                <input type="text" id="txtBreed">

            </div>

            <div class="form-group">

                <label>Born On Date</label>

                <input type="date" id="txtBornOnDate">

            </div>

            <div class="form-group">

                <label>Weight</label>

                <input type="number" step="0.1" id="txtWeight">

            </div>

            <!-- ================= CHICKEN ================= -->

            <div id="chickenPanel">

                <h3>Chicken</h3>

                <label>

                    <input type="checkbox" id="chkMolting">

                    Is Molting

                </label>

                <br><br>

                <label>Number Of Eggs</label>

                <input type="number" id="txtEggs">

            </div>

            <!-- ================= COW ================= -->

            <div id="cowPanel" style="display:none;">

                <h3>Cow</h3>

                <label>

                    <input type="checkbox" id="chkMilk">

                    Producing Milk

                </label>

            </div>

            <!-- ================= PIG ================= -->

            <div id="pigPanel" style="display:none;">

                <h3>Pig</h3>

                <label>Ideal Weight</label>

                <input type="number" step="0.1" id="txtIdealWeight">

            </div>

            <!-- ================= SHEEP ================= -->

            <div id="sheepPanel" style="display:none;">

                <h3>Sheep</h3>

                <label>Last Shearing</label>

                <input type="date" id="txtLastShearing">

            </div>

            <div class="button-group">

                <button id="btnSave">

                    Save

                </button>

                <button id="btnUpdate">

                    Update

                </button>

                <button id="btnDelete">

                    Delete

                </button>

                <button id="btnClear">

                    Clear

                </button>

            </div>

        </div>

        <!-- ================= RIGHT ================= -->

        <div class="table-container">

            <h2>Animals</h2>

            <table id="tblAnimals">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Type</th>

                        <th>Breed</th>

                        <th>Birth</th>

                        <th>Weight</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/animals.js"></script>

</body>

</html>
