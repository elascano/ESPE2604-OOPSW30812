<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze View</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="maze-view">
      <h1>Maze View</h1>
      <p>This view displays the generated maze structure.</p>

      <div class="controls">
        <label for="maze-type">Maze Type</label>
        <select id="maze-type">
          <option value="classic">Classic</option>
          <option value="random">Random</option>
        </select>

        <button type="button">Generate</button>
      </div>
    </main>
  </body>
</html>
