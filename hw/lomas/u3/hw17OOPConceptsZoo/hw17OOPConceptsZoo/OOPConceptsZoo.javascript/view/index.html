<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Farm Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; text-align: center; }
        .navbar { background-color: #333; overflow: hidden; display: none; justify-content: flex-start; }
        .navbar a { color: white; padding: 14px 20px; text-decoration: none; cursor: pointer; font-weight: bold; }
        .navbar a:hover { background-color: #ddd; color: black; }
        .container { padding: 40px; display: none; max-width: 400px; margin: 40px auto; background: white; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        .active { display: block; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background-color: #3498db; color: white; }
        .btn-delete { background-color: #e74c3c; color: white; }
        .btn-back { background-color: #7f8c8d; color: white; }
        .btn-login { background-color: #2ecc71; color: white; width: 100%; }
        .result-lbl { font-size: 1.1em; color: blue; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="navbar" id="mainNavbar">
        <a onclick="showView('homeView')">Home</a>
        <a onclick="showView('chickenView')">Chicken Management</a>
        <a onclick="showView('cowView')">Cow Management</a>
        <a onclick="showView('pigView')">Pig Management</a>
        <a onclick="showView('sheepView')">Sheep Management</a>
        <a onclick="logout()" style="margin-left: auto;">Logout</a>
    </div>

    <div id="loginView" class="container active">
        <h2>Login Secure System</h2>
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="loginUser">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="loginPass">
        </div>
        <button class="btn-login" onclick="validateLogin()">Login</button>
    </div>

    <div id="homeView" class="container" style="max-width: 600px; margin-top: 100px; box-shadow: none; background: transparent;">
        <h2>Welcome To Farm Management System</h2>
    </div>

    <div id="chickenView" class="container">
        <h2>Chicken Management</h2>
        <div class="form-group">
            <label>Id:</label>
            <input type="number" id="chickenId" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Egg Production (Weekly):</label>
            <input type="number" id="chickenEggs">
        </div>
        <div class="form-group" style="display: flex; align-items: center;">
            <input type="checkbox" id="chickenMolting" style="width: auto; margin-right: 10px;">
            <label style="margin: 0;">Is Molting Plumes?</label>
        </div>
        <div id="chickenResult" class="result-lbl">Status: -</div>
        <div class="btn-group">
            <button class="btn-back" onclick="showView('homeView')">Back to Menu</button>
            <button class="btn-delete" onclick="deleteRecord('chickens', 'chickenId', 'chickenResult')">Delete</button>
            <button class="btn-save" onclick="saveChicken()">Save</button>
        </div>
    </div>

    <div id="cowView" class="container">
        <h2>Cow Management</h2>
        <div class="form-group">
            <label>Id:</label>
            <input type="number" id="cowId" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Milk Production (Liters):</label>
            <input type="number" id="cowMilk" step="0.1">
        </div>
        <div class="form-group">
            <label>Weight (kg):</label>
            <input type="number" id="cowWeight" step="0.1">
        </div>
        <div id="cowResult" class="result-lbl">Efficiency: - | Meat: -</div>
        <div class="btn-group">
            <button class="btn-back" onclick="showView('homeView')">Back to Menu</button>
            <button class="btn-delete" onclick="deleteRecord('cows', 'cowId', 'cowResult')">Delete</button>
            <button class="btn-save" onclick="saveCow()">Save</button>
        </div>
    </div>

    <div id="pigView" class="container">
        <h2>Pig Management</h2>
        <div class="form-group">
            <label>Id:</label>
            <input type="number" id="pigId" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Breed:</label>
            <select id="pigBreed">
                <option value="Duroc">Duroc</option>
                <option value="Landrace">Landrace</option>
                <option value="Berkshire">Berkshire</option>
            </select>
        </div>
        <div class="form-group">
            <label>Weight (kg):</label>
            <input type="number" id="pigWeight" step="0.1">
        </div>
        <div class="form-group">
            <label>Ideal Weight:</label>
            <input type="number" id="pigIdealWeight" value="170" readonly style="background-color: #eee;">
        </div>
        <div id="pigResult" class="result-lbl">Result: -</div>
        <div class="btn-group">
            <button class="btn-back" onclick="showView('homeView')">Back to Menu</button>
            <button class="btn-delete" onclick="deleteRecord('pigs', 'pigId', 'pigResult')">Delete</button>
            <button class="btn-save" onclick="savePig()">Save</button>
        </div>
    </div>

    <div id="sheepView" class="container">
        <h2>Sheep Management</h2>
        <div class="form-group">
            <label>Id:</label>
            <input type="number" id="sheepId" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Weight (kg):</label>
            <input type="number" id="sheepWeight" step="0.1">
        </div>
        <div id="sheepResult" class="result-lbl">Status: -</div>
        <div class="btn-group">
            <button class="btn-back" onclick="showView('homeView')">Back to Menu</button>
            <button class="btn-delete" onclick="deleteRecord('sheeps', 'sheepId', 'sheepResult')">Delete</button>
            <button class="btn-save" onclick="saveSheep()">Save</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3000/api";

        function showView(viewId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        async function validateLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();

            if(!username || !password) {
                alert("Please fill in all fields");
                return;
            }

            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if(data.success) {
                alert("Welcome to the Farm System!");
                document.getElementById('mainNavbar').style.display = 'flex';
                showView('homeView');
            } else {
                alert(data.message);
            }
        }

        function logout() {
            alert("Closing session...");
            document.getElementById('mainNavbar').style.display = 'none';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            showView('loginView');
        }

        async function sendToAtlas(collection, doc, resultLblId, successMessage, resultText) {
            try {
                const res = await fetch(`${API_URL}/animals/${collection}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(doc)
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById(resultLblId).innerText = resultText;
                    alert(successMessage);
                }
            } catch(e) {
                alert("Server connection error");
            }
        }

        async function deleteRecord(collection, inputId, resultLblId) {
            const id = document.getElementById(inputId).value;
            try {
                const res = await fetch(`${API_URL}/animals/${collection}/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if(data.success) {
                    document.getElementById(resultLblId).innerText = "Status: Deleted";
                    alert(data.message);
                } else {
                    alert(data.message);
                }
            } catch(e) {
                alert("Error connecting to server");
            }
        }

        function saveChicken() {
            const id = parseInt(document.getElementById('chickenId').value);
            const eggs = parseInt(document.getElementById('chickenEggs').value);
            const isMolting = document.getElementById('chickenMolting').checked;

            if(isNaN(eggs)) return alert("Invalid entry");

            const status = (!isMolting && eggs > 2) ? "Optimal Production" : "Low Efficiency";
            sendToAtlas('chickens', { id, eggs, isMolting, status }, 'chickenResult', "Chicken saved to Atlas!", `Status: ${status}`);
        }

        function saveCow() {
            const id = parseInt(document.getElementById('cowId').value);
            const milk = parseFloat(document.getElementById('cowMilk').value);
            const weight = parseFloat(document.getElementById('cowWeight').value);

            if(isNaN(milk) || !weight) return alert("Invalid entry");

            const efficiency = ((milk / weight) * 100).toFixed(1);
            const expectedMeat = ((weight * 0.20) + (weight * 0.12)).toFixed(2);
            sendToAtlas('cows', { id, milk, weight, efficiency, meatYield: expectedMeat }, 'cowResult', "Cow saved to Atlas!", `Efficiency: ${efficiency}% | Meat: ${expectedMeat} kg`);
        }

        function savePig() {
            const id = parseInt(document.getElementById('pigId').value);
            const breed = document.getElementById('pigBreed').value;
            const weight = parseFloat(document.getElementById('pigWeight').value);
            const idealWeight = parseInt(document.getElementById('pigIdealWeight').value);

            if(!weight) return alert("Invalid entry");

            const expectedMeat = ((weight * 0.15) + (weight * 0.10)).toFixed(2);
            sendToAtlas('pigs', { id, breed, weight, idealWeight, expectedMeat }, 'pigResult', "Pig record saved to Atlas!", `Result: ${expectedMeat} kg`);
        }

        function saveSheep() {
            const id = parseInt(document.getElementById('sheepId').value);
            const weight = parseFloat(document.getElementById('sheepWeight').value);

            if(!weight) return alert("Invalid entry");

            const status = (weight >= 45.0 && weight <= 80.0) ? "Ready for Shearing" : "Under Evaluation";
            sendToAtlas('sheeps', { id, weight, status }, 'sheepResult', "Sheep record saved to Atlas!", `Status: ${status}`);
        }
    </script>
</body>
</html>
