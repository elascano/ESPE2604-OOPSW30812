<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Generator</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">

        <h1>Maze System</h1>

        <section class="controls">

            <div class="dimensions">

                <label for="width">Width</label>

                <input
                    id="width"
                    type="number"
                    value="10"
                    min="2"
                    max="30">

                <label for="height">Height</label>

                <input
                    id="height"
                    type="number"
                    value="10"
                    min="2"
                    max="30">

            </div>

            <div class="buttons">

                <button id="generateMaze">
                    Generate Maze
                </button>

                <button id="printMaze">
                    Print to Console
                </button>

                <button id="saveMaze">
                    Save as Image
                </button>

            </div>

        </section>

        <section class="maze-panel">

            <canvas
                id="mazeCanvas"
                width="400"
                height="400">
            </canvas>

        </section>

        <section class="console-panel">

            <h3>Console</h3>

            <textarea
                id="consoleOutput"
                readonly>
            </textarea>

        </section>

    </main>

    <script type="module" src="app.js"></script>

</body>

</html>
