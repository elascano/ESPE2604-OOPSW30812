<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        h2 {
            background: #2c3e50;
            color: white;
            padding: 15px;
            margin: 0;
        }
        
        .content {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }
        
        .form-panel {
            flex: 0 0 350px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background: #fafafa;
        }
        
        .form-panel h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        button {
            padding: 10px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-add {
            background: #27ae60;
            color: white;
        }
        
        .btn-add:hover {
            background: #229954;
        }
        
        .btn-clear {
            background: #e67e22;
            color: white;
        }
        
        .btn-clear:hover {
            background: #d35400;
        }
        
        .table-panel {
            flex: 1;
            min-width: 500px;
        }
        
        .table-panel h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #34495e;
            color: white;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .stats {
            margin-top: 10px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📚 Student Management System</h2>
        <div class="content">
            <div class="form-panel">
                <h3>Student Entry</h3>
                <div class="form-group">
                    <label>ID Number:</label>
                    <input type="text" id="idNumber">
                </div>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="name">
                </div>
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" id="age">
                </div>
                <div class="form-group">
                    <label>Career:</label>
                    <select id="career">
                        <option>Software Engineering</option>
                        <option>Computer Science</option>
                        <option>Business</option>
                        <option>Medicine</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Grades (comma separated, 0-20):</label>
                    <input type="text" id="grades" placeholder="ej: 15.5, 18, 20">
                </div>
                <div class="form-group">
                    <button class="btn-add" onclick="app.addStudent()">➕ Add Student</button>
                    <button class="btn-clear" onclick="app.clearFields()">🗑️ Clear</button>
                </div>
            </div>
            <div class="table-panel">
                <h3>Students List</h3>
                <div style="overflow-x: auto;">
                    <table id="studentTable">
                        <thead>
                            <tr>
                                <th>ID Number</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Career</th>
                                <th>GPA</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="stats" id="stats"></div>
            </div>
        </div>
    </div>

    <script src="../model/Student.js"></script>
    <script src="../model/JsonManager.js"></script>
    <script>
        class StudentApp {
            constructor() {
                this.manager = new JsonManager();
                this.loadTable();
            }

            addStudent() {
                try {
                    const idNumber = document.getElementById('idNumber').value.trim();
                    const name = document.getElementById('name').value.trim();
                    const age = parseInt(document.getElementById('age').value);
                    const career = document.getElementById('career').value;
                    const gradesText = document.getElementById('grades').value.trim();

                    if (isNaN(age)) {
                        throw new Error("Invalid age numeric format");
                    }

                    const grades = [];
                    if (gradesText) {
                        const gradeArray = gradesText.split(',');
                        for (let g of gradeArray) {
                            const value = parseFloat(g.trim());
                            if (isNaN(value)) {
                                throw new Error("Invalid grade format");
                            }
                            if (value < 0 || value > 20) {
                                throw new Error("Grades must be 0-20");
                            }
                            grades.push(value);
                        }
                    }

                    if (!idNumber || !name || grades.length === 0) {
                        throw new Error("Fields cannot be empty");
                    }

                    const student = new Student(idNumber, name, age, career, grades);
                    this.manager.addStudent(student);
                    this.loadTable();
                    this.clearFields();
                    alert("✅ Student added successfully");

                } catch (error) {
                    alert("❌ Error: " + error.message);
                }
            }

            loadTable() {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                const students = this.manager.getStudents();
                
                for (let s of students) {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerText = s.getIdNumber();
                    row.insertCell(1).innerText = s.getName();
                    row.insertCell(2).innerText = s.getAge();
                    row.insertCell(3).innerText = s.getCareer();
                    row.insertCell(4).innerText = s.calculateGPA().toFixed(2);
                }
                
                const stats = document.getElementById('stats');
                stats.innerHTML = `📊 Total students: ${students.length}`;
            }

            clearFields() {
                document.getElementById('idNumber').value = '';
                document.getElementById('name').value = '';
                document.getElementById('age').value = '';
                document.getElementById('grades').value = '';
                document.getElementById('career').selectedIndex = 0;
            }
        }

        const app = new StudentApp();
    </script>
</body>
</html>
