<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Management</title>
</head>
<body>
<h2>Product Management</h2>

<input id="entryId" placeholder="Product ID">
<input id="entryName" placeholder="Name">
<button onclick="addProduct()">Save</button>

<table border="1">
<thead><tr><th>ID</th><th>Name</th></tr></thead>
<tbody id="productTableBody"></tbody>
</table>

<input id="entryDeleteId" placeholder="ID to delete">
<button onclick="deleteById()">Delete</button>

<script>
const products = {};

function updateTable() {
    const body = document.getElementById("productTableBody");
    body.innerHTML = "";
    for (const id in products) {
        body.innerHTML += `<tr><td>${id}</td><td>${products[id]}</td></tr>`;
    }
}

function addProduct() {
    const id = document.getElementById("entryId").value.trim();
    const name = document.getElementById("entryName").value.trim();
    if (!id || !name) return;

    products[id] = name;
    updateTable();
}

function deleteById() {
    const id = document.getElementById("entryDeleteId").value.trim();
    delete products[id];
    updateTable();
}
</script>

</body>
</html>
