<!DOCTYPE html>
<html>

<head>

    <title>Product System</title>

    <style>

        body {
            font-family: Arial;
            padding: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px;
            margin: 5px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>

    <h1>Product System</h1>

    <input type="text" id="id" placeholder="ID">

    <input type="text" id="name" placeholder="Name">

    <input type="number" id="price" placeholder="Price">

    <button onclick="addProduct()">
        Add Product
    </button>

    <table id="table">

        <thead>

            <tr>

                <th>ID</th>
                <th>NAME</th>
                <th>PRICE</th>
                <th>ACTION</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

    <script>

        let products = [];

        function addProduct() {

            const id =
                document.getElementById("id").value;

            const name =
                document.getElementById("name").value;

            const price =
                document.getElementById("price").value;

            if(id === "" || name === "" || price === "") {

                alert("Complete all fields");

                return;
            }

            products.push({
                id,
                name,
                price
            });

            updateTable();

            clearFields();
        }

        function updateTable() {

            const tbody =
                document.querySelector("tbody");

            tbody.innerHTML = "";

            products.forEach((product, index) => {

                tbody.innerHTML += `

                <tr>

                    <td>${product.id}</td>

                    <td>${product.name}</td>

                    <td>${product.price}</td>

                    <td>

                        <button onclick="deleteProduct(${index})">

                            Delete

                        </button>

                    </td>

                </tr>
                `;
            });
        }

        function deleteProduct(index) {

            products.splice(index, 1);

            updateTable();
        }

        function clearFields() {

            document.getElementById("id").value = "";
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
        }

    </script>

</body>
</html>
