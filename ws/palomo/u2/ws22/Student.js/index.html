<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Students CRUD MVC</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

    <h1>Students CRUD MVC</h1>

    <input
        type="number"
        id="id"
        placeholder="Student ID">

    <br>

    <input
        type="text"
        id="name"
        placeholder="Student Name">

    <br>

    <input
        type="number"
        id="grade1"
        placeholder="Grade 1">

    <br>

    <input
        type="number"
        id="grade2"
        placeholder="Grade 2">

    <br><br>

    <button id="btnCreate">
        Create
    </button>

    <button id="btnFind">
        Find
    </button>

    <button id="btnUpdate">
        Update
    </button>

    <button id="btnDelete">
        Delete
    </button>

    <button id="btnList">
        List All
    </button>

    <div id="result"></div>

</div>

<script type="module" src="view/app.js"></script>

</body>

</html>
