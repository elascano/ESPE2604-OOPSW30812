<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header con botones principales -->
        <div class="header">
            <h1>📚 STUDENT MANAGEMENT SYSTEM</h1>
            <div class="main-buttons">
                <button class="btn-add" id="btnAddStudent">➕ ADD STUDENT</button>
                <button class="btn-reload" id="btnReload">🔄 RELOAD DATA</button>
                <button class="btn-average" id="btnAverage">📊 SHOW AVERAGES</button>
                <button class="btn-exit" id="btnExit">❌ EXIT</button>
            </div>
        </div>

        <!-- Pestañas -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="list">📋 Student List</button>
            <button class="tab-btn" data-tab="add">➕ Quick Add</button>
        </div>

        <!-- Pestaña: Lista de Estudiantes -->
        <div id="tab-list" class="tab-content active">
            <div class="table-controls">
                <button id="btnRefresh" class="btn-secondary">🔄 Refresh Table</button>
                <button id="btnDelete" class="btn-danger">🗑️ Delete Selected</button>
                <button id="btnExport" class="btn-info">💾 Export JSON</button>
                <label class="btn-info" style="display: inline-block; padding: 8px 16px; cursor: pointer;">
                    📂 Import JSON
                    <input type="file" id="btnImport" accept=".json" style="display: none;">
                </label>
            </div>
            <div class="table-container">
                <table id="studentTable">
                    <thead>
                        <tr><th>First Name</th><th>Last Name</th><th>Age</th><th>Subjects</th><th>Average</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Pestaña: Agregar Rápido -->
        <div id="tab-add" class="tab-content">
            <div class="form-container">
                <!-- Información del Estudiante -->
                <fieldset>
                    <legend>📝 Student Information</legend>
                    <div class="form-group">
                        <label>First Name:</label>
                        <input type="text" id="txtFirstName" placeholder="First Name">
                    </div>
                    <div class="form-group">
                        <label>Last Name:</label>
                        <input type="text" id="txtLastName" placeholder="Last Name">
                    </div>
                    <div class="form-group">
                        <label>Age:</label>
                        <input type="number" id="txtAge" placeholder="Age">
                    </div>
                    <div class="form-group">
                        <label>Select Subject:</label>
                        <select id="cbSubjects">
                            <option value="Mathematics">📐 Mathematics</option>
                            <option value="Physics">⚡ Physics</option>
                            <option value="History">📖 History</option>
                            <option value="Programming">💻 Programming</option>
                            <option value="English">🇬🇧 English</option>
                            <option value="Chemistry">🧪 Chemistry</option>
                            <option value="Biology">🔬 Biology</option>
                            <option value="Arts">🎨 Arts</option>
                        </select>
                        <button id="btnAddSubject" class="btn-success">➕ ADD SUBJECT WITH GRADES</button>
                    </div>
                </fieldset>

                <!-- Materias y Notas -->
                <fieldset>
                    <legend>📚 Subjects and Grades</legend>
                    <ul id="subjectList"></ul>
                    <button id="btnRemoveSubject" class="btn-warning">❌ Remove Selected Subject</button>
                </fieldset>

                <!-- Botones de acción -->
                <div class="form-actions">
                    <button id="btnSave" class="btn-save">💾 SAVE STUDENT</button>
                    <button id="btnClear" class="btn-clear">🗑️ Clear Form</button>
                </div>
            </div>
        </div>

        <!-- Barra de estado -->
        <div class="status-bar" id="statusBar">
            ✅ Ready | Total students: 0 | Accepts integers (15) and decimals (15.5)
        </div>
    </div>

    <!-- Diálogo para ingresar notas -->
    <div id="gradeDialog" class="modal">
        <div class="modal-content">
            <h3 id="dialogTitle">📝 Enter grades</h3>
            <div class="grades-input">
                <input type="text" id="grade1" placeholder="Grade 1 (0-20)">
                <input type="text" id="grade2" placeholder="Grade 2 (0-20)">
                <input type="text" id="grade3" placeholder="Grade 3 (0-20)">
            </div>
            <div class="examples">
                💡 Examples: 15 (integer) | 15.5 (decimal) | 15,75 (comma)
            </div>
            <div class="modal-buttons">
                <button id="btnSaveGrades" class="btn-save">💾 SAVE GRADES</button>
                <button id="btnCancelGrades" class="btn-cancel">CANCEL</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
